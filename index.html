  <style>

    body { font-family: 'Poppins', sans-serif; background: var(--bg-color); color: #333; }
    
    .top-navbar { background: var(--mandiri-blue); color: white; padding: 12px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1040; }

    .livin-icon { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 28px; color: white; }
    .icon-dashboard { background: linear-gradient(135deg, #003D79, #00509e); }
    .icon-cek { background: linear-gradient(135deg, #17a2b8, #3fc1d6); }
    .icon-tambah { background: linear-gradient(135deg, #198754, #20c997); }

    .livin-title { font-size: 0.95rem; font-weight: 600; color: var(--mandiri-blue); line-height: 1.3; }

    .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.04); overflow: hidden; }
    .card-header { border-bottom: 1px solid #eee; background-color: #fff !important; }
    
    .bg-mandiri-blue { background-color: var(--mandiri-blue) !important; color: white; }
    .bg-mandiri-yellow { background-color: var(--mandiri-yellow) !important; color: var(--mandiri-blue); }
    .btn-primary { background-color: var(--mandiri-blue); border-color: var(--mandiri-blue); border-radius: 8px; font-weight: 500; }
    .btn-warning { background-color: var(--mandiri-yellow); border-color: var(--mandiri-yellow); color: var(--mandiri-blue); font-weight: 600; border-radius: 8px; }
    .badge { padding: 8px 12px; border-radius: 6px; font-weight: 500; font-size: 0.8rem; letter-spacing: 0.5px; }

    .table td { white-space: normal !important; word-wrap: break-word !important; overflow-wrap: break-word !important; vertical-align: top !important; font-size: 0.85rem; line-height: 1.6; color: #444; border-bottom: 1px solid #f1f1f1; padding: 15px 12px; }

aceholder="Contoh: Kredit, Operasional"></div><div class="col-md-6 mb-3"><label class="form-label">Status Akun</label><select id="editStatus" class="form-select bg-light border-warning"><option value="true">Aktif</option><option value="false">Non-aktif</option></select></div><div class="col-md-6 mb-3"><label class="form-label">Reset Password</label><input type="text" id="editPass" class="form-control border-warning" placeholder="(Kosongkan jika tetap)"></div></div><div id="editUsrMsg"></div></div><div class="modal-footer bg-light"><button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button class="btn btn-warning px-4" onclick="submitEditUser()"><i class="fas fa-save me-1"></i> Perbarui</button></div></div></div></div>

  <script>
    // ==========================================================
    // KONEKSI API GITHUB -> GOOGLE APPS SCRIPT
    // ==========================================================
    
    // GANTI TULISAN DI BAWAH INI DENGAN URL WEB APP ANDA!!
    const API_URL = "https://script.google.com/macros/s/AKfycbzGr-sRmT1k7XHn6glBd6MSRbMzNOg34syNvWivVwtwb1xbkjEyrGQNDXv2Kh6SA2GC/exec"; 

   // Fungsi Fetch API yang dijamin kebal blokir CORS Google
    async function apiCall(action, params = {}) {
      // Otomatis menempelkan Token Sesi (ID Card) pada setiap request
      const payload = { action: action, token: authToken, ...params }; 
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // Wajib text/plain agar tidak diblokir
          body: JSON.stringify(payload),
          redirect: 'follow' // Wajib follow agar bisa mengikuti alur Google
        });
        
        if (!response.ok) throw new Error("HTTP Error: " + response.status);
        
        const result = await response.json();
        if (!result.success) throw new Error(result.message);
        return result.data;
      } catch (error) { throw error; }
    }
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // Wajib text/plain agar tidak diblokir
          body: JSON.stringify(payload),
          redirect: 'follow' // Wajib follow agar bisa mengikuti alur Google
        });
        
        if (!response.ok) throw new Error("HTTP Error: " + response.status);
        
        const result = await response.json();
        if (!result.success) throw new Error(result.message);
        return result.data;
      } catch (error) { throw error; }
    }

    // ==========================================================
    // UTILITY FUNCTIONS & ERROR HANDLING
    // ==========================================================
    function toBase64(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error); }); }
    function toggleAddRoleFields(role) { document.getElementById('addCabangDiv').style.display = (role === 'cabang') ? 'block' : 'none'; document.getElementById('addSpesDiv').style.display = (role === 'pic_jenis') ? 'block' : 'none'; }
    function toggleEditRoleFields(role) { document.getElementById('editCabangDiv').style.display = (role === 'cabang') ? 'block' : 'none'; document.getElementById('editSpesDiv').style.display = (role === 'pic_jenis') ? 'block' : 'none'; }
    function showLoader(text="Memproses...") { document.getElementById('loaderText').innerText = text; document.getElementById('globalLoader').classList.replace('d-none', 'd-flex'); }
    function hideLoader() { document.getElementById('globalLoader').classList.replace('d-flex', 'd-none'); }
    function showAlert(msg) { document.getElementById('alertMsg').innerText = msg; new bootstrap.Modal(document.getElementById('alertModal')).show(); }

    function showErrorAlert(msg) {
        hideLoader(); let pc = document.getElementById('pageContent');
        if(pc) { pc.innerHTML = `<div class="alert alert-danger m-4 shadow border-danger"><h4 class="fw-bold"><i class="fas fa-exclamation-triangle me-2"></i>Terjadi Kesalahan</h4><p>${msg}</p><button class="btn btn-outline-danger mt-3 fw-bold" onclick="refreshData()"><i class="fas fa-sync-alt me-1"></i> Coba Muat Ulang</button></div>`;
        } else { alert("Terjadi Kesalahan: " + msg); }
    }

    function showConfirm(msg, callback) { document.getElementById('confirmMsg').innerText = msg; document.getElementById('confirmBtn').onclick = () => { bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide(); callback(); }; new bootstrap.Modal(document.getElementById('confirmModal')).show(); }
    function showPrompt(callback) { document.getElementById('promptInput').value = ''; document.getElementById('promptBtn').onclick = () => { const val = document.getElementById('promptInput').value; if(!val) return showAlert("Alasan penolakan wajib diisi!"); bootstrap.Modal.getInstance(document.getElementById('promptModal')).hide(); callback(val); }; new bootstrap.Modal(document.getElementById('promptModal')).show(); }

    function parseDateString(val) {
      if (!val || val === '-') return null;
      let str = String(val).trim(); let parts;
      if (str.includes('/')) parts = str.split('/'); else if (str.includes('-')) parts = str.split('-'); else return new Date(str);
      if (parts && parts.length === 3) {
         if (parts[2].length === 4) return new Date(parts[2], parseInt(parts[1])-1, parts[0]);
         if (parts[0].length === 4) return new Date(parts[0], parseInt(parts[1])-1, parts[2]);
      }
      return new Date(str);
    }
    
    function getIsoDate(val) { let d = parseDateString(val); if (!d || isNaN(d)) return ''; return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
    function formatTgl(val) { let d = parseDateString(val); if (!d || isNaN(d)) return val || '-'; return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear(); }

    function formatTextHTML(text) {
       if (!text) return '-';
       let safeText = String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
       let lines = safeText.split('\n'); let html = ''; let lastIndent = 0;
       lines.forEach(line => {
          let matchSpaces = line.match(/^(\s+)/); let spaceCount = matchSpaces ? matchSpaces[1].length : 0; let explicitIndent = spaceCount > 0 ? (spaceCount * 10) : -1; 
          let trimmed = line.trim(); let computedIndent = explicitIndent;
          let isChecklist = trimmed.match(/^\[[xXvV\s]\]/); 
          let isNumber = /^[0-9]+[\.\)]\s+/.test(trimmed); let isRoman = /^(i|ii|iii|iv|v|vi|vii|viii|ix|x|xi|xii)[\.\)]\s+/i.test(trimmed); let isLetter = /^[a-z][\.\)]\s+/i.test(trimmed) && !isRoman; let isBullet = /^[-*•]\s+/.test(trimmed);

          if (explicitIndent === -1) {
             if (isNumber) computedIndent = 0; else if (isLetter) computedIndent = 20; else if (isRoman) computedIndent = 40; else if (isBullet) computedIndent = 20; else computedIndent = lastIndent;
          }
          computedIndent = Math.max(0, computedIndent); lastIndent = computedIndent;
          
          if(isChecklist) { html += `<div style="margin-left: ${computedIndent}px; margin-bottom: 4px;" class="fw-bold text-success">${trimmed}</div>`; }
          else if (isNumber || isLetter || isRoman) { html += `<div style="margin-left: ${computedIndent}px; padding-left: 20px; text-indent: -20px; margin-bottom: 4px;">${trimmed}</div>`;
          } else if (isBullet) { let cleanText = trimmed.replace(/^[-*•]\s+/, ''); html += `<div style="margin-left: ${computedIndent}px; display: flex; margin-bottom: 4px;"><span style="width: 15px; flex-shrink: 0;">•</span><div>${cleanText}</div></div>`;
          } else if (trimmed !== '') { html += `<div style="margin-left: ${computedIndent}px; margin-bottom: 4px;">${trimmed}</div>`;
          } else { html += `<div style="height: 6px;"></div>`; }
       });
       return html;
    }

    function viewDocumentInModal(url) { document.getElementById('fileViewerFrame').src = url; const m = bootstrap.Modal.getOrCreateInstance(document.getElementById('fileViewerModal')); m.show(); }

    let inactivityTimer; let silentInterval;
    function resetInactivityTimer() { clearTimeout(inactivityTimer); if (authToken && currentUser) { inactivityTimer = setTimeout(() => { logout(true); }, 900000); } }

    let authToken = localStorage.getItem('authToken');
    let currentUser = null; let activeMenu = 'home'; let globalFindings = []; let globalUsers = []; let myChart = null; let currentFilteredIds = []; let isSearchActive = false;
    let appConfig = { app_name: 'SaPu Temuan', app_desc: 'Sistem Pemantauan Temuan Review', app_logo: '' }; 

    // ==========================================================
    // INITIALIZATION (OPTIMISTIC UI)
    // ==========================================================
    window.onload = async function() {
      document.body.addEventListener('mousemove', resetInactivityTimer); document.body.addEventListener('keypress', resetInactivityTimer); document.body.addEventListener('click', resetInactivityTimer); document.body.addEventListener('scroll', resetInactivityTimer);
      const fvModal = document.getElementById('fileViewerModal'); if(fvModal) { fvModal.addEventListener('hidden.bs.modal', function () { document.getElementById('fileViewerFrame').src = ''; }); }
      
      if (!authToken) { showLogin(); }
      
      try {
          const data = await apiCall('getInitialData', { token: authToken });
          appConfig = data.config || appConfig; document.title = appConfig.app_name;
          if(!authToken) { updateLoginBranding(); }
          
          if (data.user && authToken) {
             currentUser = data.user; globalFindings = data.findings || [];
             updateBellNotification(); renderHome(); resetInactivityTimer();
             silentInterval = setInterval(async () => { 
                if(authToken) { try{ globalFindings = await apiCall('getFindings', {token: authToken}); updateBellNotification(); }catch(e){} } 
             }, 45000);
          } else if(authToken) { localStorage.removeItem('authToken'); authToken = null; showLogin(); }
      } catch(e) { 
          if(authToken) { localStorage.removeItem('authToken'); authToken = null; showLogin(); } 
      }
      
      if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').then(reg => console.log('SW terdaftar')).catch(err => console.log('SW Gagal', err)); }
    };

    function showLogin() {
      let name = appConfig.app_name || 'SaPu Temuan'; let desc = appConfig.app_desc || 'Sistem Pemantauan Temuan Review';
      let logoHtml = appConfig.app_logo ? `<img src="${appConfig.app_logo}" alt="Logo" style="max-height: 120px; width: auto; max-width: 100%; margin-bottom: 15px; object-fit: contain;">` : `<i class="fas fa-shield-alt fa-4x text-warning mb-3" id="loginLogoIcon"></i>`;
      document.getElementById('app').innerHTML = `<div class="container d-flex justify-content-center align-items-center min-vh-100"><div class="card" style="width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,61,121,0.15);"><div class="card-header bg-mandiri-blue text-center py-4 brand-element" id="loginHeaderArea">${logoHtml}<h3 class="mb-0 fw-bold text-white" id="loginAppName">${name}</h3><small class="text-white-50" id="loginAppDesc">${desc}</small></div><div class="card-body p-4"><div class="mb-3"><label class="form-label text-muted">NIP / ID Pengguna</label><div class="input-group"><span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span><input type="text" id="nip" class="form-control" placeholder="Masukkan NIP"></div></div><div class="mb-4"><label class="form-label text-muted">Kata Sandi</label><div class="input-group"><span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span><input type="password" id="password" class="form-control" placeholder="Password" onkeydown="if(event.key === 'Enter') login()"></div></div><button class="btn btn-warning w-100 py-2 mb-2 shadow-sm fw-bold" onclick="login()">Login</button><p id="loginMessage" class="text-danger text-center mt-2 fw-medium"></p></div></div></div>`;
    }

    function updateLoginBranding() {
      const headerArea = document.getElementById('loginHeaderArea');
      if (headerArea && appConfig.app_logo) {
         headerArea.style.opacity = 0; 
         setTimeout(() => {
            headerArea.innerHTML = `<img src="${appConfig.app_logo}" alt="Logo" style="max-height: 120px; width: auto; max-width: 100%; margin-bottom: 15px; object-fit: contain;"><h3 class="mb-0 fw-bold text-white">${appConfig.app_name}</h3><small class="text-white-50">${appConfig.app_desc}</small>`;
            headerArea.style.opacity = 1; 
         }, 300);
      } else if (document.getElementById('loginAppName')) {
         document.getElementById('loginAppName').innerText = appConfig.app_name; document.getElementById('loginAppDesc').innerText = appConfig.app_desc;
      }
    }

    async function login() {
      const nipVal = document.getElementById('nip').value; const passVal = document.getElementById('password').value;
      if (!nipVal || !passVal) { document.getElementById('loginMessage').innerHTML = '<span class="text-danger">Harap isi NIP dan Kata Sandi.</span>'; return; }
      document.getElementById('loginMessage').innerHTML = ''; showLoader('Memproses Login...');
      try {
        const res = await apiCall('doLogin', { nip: nipVal, password: passVal });
        hideLoader(); 
        authToken = res.token; localStorage.setItem('authToken', authToken); currentUser = res.user; globalFindings = res.findings || [];
        updateBellNotification(); renderHome(); resetInactivityTimer(); 
        clearInterval(silentInterval); silentInterval = setInterval(async () => { if(authToken){ try{ globalFindings = await apiCall('getFindings', {token: authToken}); updateBellNotification(); }catch(e){} } }, 45000);
      } catch(err) { hideLoader(); document.getElementById('loginMessage').innerHTML = `<span class="text-danger">${err.message}</span>`; }
    }

    function logout(isSilent = false) { clearTimeout(inactivityTimer); clearInterval(silentInterval); const oldToken = authToken; localStorage.removeItem('authToken'); authToken = null; currentUser = null; globalFindings = []; showLogin(); updateLoginBranding(); }
    function openGantiPassModal() { document.getElementById('passLama').value = ''; document.getElementById('passBaru').value = ''; document.getElementById('passMsg').innerHTML = ''; const m = bootstrap.Modal.getOrCreateInstance(document.getElementById('gantiPassModal')); m.show(); }

    async function submitGantiPass() {
      const lama = document.getElementById('passLama').value; const baru = document.getElementById('passBaru').value;
      if(!lama || !baru) return showAlert("Harap isi kedua kolom sandi!");
      document.getElementById('passMsg').innerHTML = '<div class="alert alert-info"><i class="fas fa-spinner fa-spin me-2"></i>Menyimpan...</div>';
      try {
        const res = await apiCall('ubahPasswordSendiri', { token: authToken, oldPass: lama, newPass: baru });
        document.getElementById('passMsg').innerHTML = `<div class="alert alert-success">${res.message}</div>`; setTimeout(() => { bootstrap.Modal.getInstance(document.getElementById('gantiPassModal')).hide(); }, 1500);
      } catch(err) { document.getElementById('passMsg').innerHTML = `<div class="alert alert-danger">${err.message}</div>`; }
    }

    function updateBellNotification() {
      if (!globalFindings || !currentUser) return;
      let actionable = [];
      if (currentUser.role === 'cabang' || currentUser.role === 'pic_jenis') { actionable = globalFindings.filter(f => { let s=String(f.status).toLowerCase(); return s==='pending'||s==='overdue';});
      } else if (currentUser.role === 'auditor' || currentUser.role === 'reviewer') { actionable = globalFindings.filter(f => String(f.status).toLowerCase() === 'review');
      } else if (currentUser.role === 'pimpinan') { actionable = globalFindings.filter(f => String(f.status).toLowerCase() === 'approval' && String(f.target_approver) === String(currentUser.nip)); }

      const badge = document.getElementById('bellBadge'); const menu = document.getElementById('bellMenu');
      if (badge && menu) {
        if (actionable.length > 0) { badge.style.display = 'block'; badge.innerText = actionable.length; menu.innerHTML = `<div class="mb-2"><i class="fas fa-bell fa-2x text-warning"></i></div><h6 class="fw-bold text-primary mb-2">Notifikasi Antrean</h6><p class="small text-muted mb-0">Terdapat <b>${actionable.length} temuan</b> pada antrean Anda yang membutuhkan tindak lanjut segera.</p>`;
        } else { badge.style.display = 'none'; menu.innerHTML = `<div class="py-3"><i class="fas fa-check-circle fa-3x text-success mb-3"></i><h6 class="fw-bold text-dark">Semua Tuntas!</h6><p class="small text-muted mb-0">Saat ini tidak ada temuan yang harus ditindaklanjuti.</p></div>`; }
      }
    }

    function getTopNavbarHTML(showBackBtn = false, pageTitle = '') {
      const safeName = String(currentUser.nama || currentUser.nip || 'U'); const initialName = safeName.charAt(0).toUpperCase();
      let name = appConfig.app_name || 'SaPu Temuan';
      let logoNav = appConfig.app_logo ? `<img src="${appConfig.app_logo}" alt="Logo">` : `<i class="fas fa-shield-alt text-warning me-2" style="font-size: 1.8rem;"></i>`;
      let leftContent = `<div class="brand-logo" onclick="renderHome()">${logoNav}<span>${name}</span></div>`;
      if (showBackBtn) { leftContent = `<div class="brand-logo" onclick="renderHome()"><i class="fas fa-arrow-left me-3"></i>${pageTitle}</div>`; }

      return `<nav class="top-navbar d-flex justify-content-between align-items-center">${leftContent}<div class="d-flex align-items-center"><button class="btn btn-sm btn-outline-light me-3 fw-bold border-0" onclick="refreshData()"><i class="fas fa-sync-alt me-1"></i> Refresh</button><div class="dropdown me-4 position-relative"><i class="fas fa-bell text-white fs-5" data-bs-toggle="dropdown" style="cursor:pointer;"></i><span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger shadow" id="bellBadge" style="font-size:0.65rem; display:none;">0</span><ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-3 p-3 text-center" style="width: 280px; border-radius:12px;" id="bellMenu"><div class="spinner-border text-primary spinner-border-sm"></div></ul></div><div class="dropdown"><div class="user-profile" data-bs-toggle="dropdown" aria-expanded="false"><div class="user-avatar shadow-sm">${initialName}</div><span class="fw-medium d-none d-sm-inline">${safeName}</span><i class="fas fa-chevron-down ms-2 small"></i></div><ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2"><li><h6 class="dropdown-header text-capitalize">Role: ${currentUser.role === 'auditor' ? 'Reviewer' : currentUser.role}</h6></li><li><a class="dropdown-item" href="javascript:void(0)" onclick="openGantiPassModal()"><i class="fas fa-key me-2 text-warning"></i> Ganti Sandi</a></li><li><hr class="dropdown-divider"></li><li><a class="dropdown-item text-danger fw-bold" href="javascript:void(0)" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Keluar</a></li></ul></div></div></nav>`;
    }

    async function refreshData(triggerAction = null) {
      showLoader("Memuat data terbaru...");
      try {
          globalFindings = await apiCall('getFindings', { token: authToken });
          updateBellNotification(); hideLoader();
          if (activeMenu === 'dashboard') renderDashboardContainer();
          else if (activeMenu === 'cek_temuan' && isSearchActive) applyCekTemuan(); 
          else if (activeMenu === 'cek_temuan' && !isSearchActive) renderCekTemuanContainer();
          else if (activeMenu === 'progress') renderProgressContainer();
          if(triggerAction === 'closeDetail'){ const el = document.getElementById('detailTemuanModal'); if(el) { const m = bootstrap.Modal.getInstance(el); if(m) m.hide(); } }
      } catch(err) { hideLoader(); showErrorAlert("Gagal terhubung ke Database: " + err.message); }
    }

    function renderHome() {
      activeMenu = 'home'; isSearchActive = false; 
      const safeName = String(currentUser.nama || currentUser.nip || 'User');
      let roleDisplay = currentUser.role === 'auditor' ? 'Reviewer' : currentUser.role; if (currentUser.role === 'pic_jenis') roleDisplay = 'PIC: ' + (currentUser.spesialisasi || 'Multidivisi');
      
      let subTitleParts = [];
      if (currentUser.jabatan) subTitleParts.push(currentUser.jabatan);
      if (currentUser.cabang) subTitleParts.push(currentUser.cabang); else if (currentUser.timReview) subTitleParts.push(currentUser.timReview);
      let displaySub = subTitleParts.length > 0 ? subTitleParts.join(' - ') : roleDisplay;

      let gridHtml = `<div class="livin-card" onclick="renderView('dashboard')"><div class="livin-icon icon-dashboard"><i class="fas fa-chart-pie"></i></div><div class="livin-title">Dashboard</div></div><div class="livin-card" onclick="renderView('cek_temuan')"><div class="livin-icon icon-cek"><i class="fas fa-search"></i></div><div class="livin-title">Pencarian Temuan</div></div><div class="livin-card" onclick="renderView('progress')"><div class="livin-icon icon-progress"><i class="fas fa-tasks"></i></div><div class="livin-title">Progress Penyelesaian</div></div>`;
      
      if (currentUser.role === 'admin' || currentUser.role === 'auditor' || currentUser.role === 'reviewer') {
        gridHtml += `<div class="livin-card" onclick="renderView('tambah')"><div class="livin-icon icon-tambah"><i class="fas fa-plus-square"></i></div><div class="livin-title">Buat Temuan Manual</div></div><div class="livin-card" onclick="renderView('upload_lhr')"><div class="livin-icon icon-upload"><i class="fas fa-file-word"></i></div><div class="livin-title">Upload LHR Word</div></div>`;
        if(currentUser.role === 'admin') {
           gridHtml += `<div class="livin-card" onclick="renderView('users')"><div class="livin-icon icon-users"><i class="fas fa-users-cog"></i></div><div class="livin-title">Kelola User</div></div><div class="livin-card" onclick="renderView('laporan')"><div class="livin-icon icon-laporan"><i class="fas fa-file-export"></i></div><div class="livin-title">Cetak LHR</div></div><div class="livin-card" onclick="renderView('identitas')"><div class="livin-icon icon-identitas"><i class="fas fa-palette"></i></div><div class="livin-title">Identitas Aplikasi</div></div><div class="livin-card" onclick="renderView('notifikasi')"><div class="livin-icon icon-notif"><i class="fas fa-bullhorn"></i></div><div class="livin-title">Setting Notifikasi</div></div>`;
        }
      }
      document.getElementById('app').innerHTML = `${getTopNavbarHTML(false)}<div class="main-wrapper"><div class="card mb-4 bg-mandiri-blue text-white shadow-sm" style="border-radius: 20px;"><div class="card-body p-4 p-md-5 d-flex align-items-center"><div class="bg-white rounded-circle d-flex justify-content-center align-items-center text-primary fw-bold shadow-sm" style="width: 70px; height: 70px; font-size: 2rem;">${safeName.charAt(0).toUpperCase()}</div><div class="ms-4"><h3 class="mb-1 fw-bold">Selamat Datang, ${safeName}!</h3><div class="badge bg-mandiri-yellow text-capitalize fs-6 px-3 py-2 shadow-sm text-dark mt-2">${displaySub}</div></div></div></div><h5 class="fw-bold text-primary mb-3"><i class="fas fa-th-large me-2 text-warning"></i>Menu Sistem</h5><div class="livin-grid">${gridHtml}</div></div>`;
    }

    function renderView(menu) {
      activeMenu = menu;
      let title = menu.replace('_', ' '); 
      if(menu === 'tambah') title = 'Buat Temuan Manual'; else if(menu === 'cek_temuan') title = 'Pencarian Temuan'; else if(menu === 'progress') title = 'Progress Penyelesaian'; else if(menu === 'upload_lhr') title = 'Ekstraksi Temuan dari Word'; else if(menu === 'notifikasi') title = 'Pengaturan Notifikasi Otomatis'; else if(menu === 'identitas') title = 'Pengaturan Identitas & Logo';

      document.getElementById('app').innerHTML = `${getTopNavbarHTML(true, title)}<div class="main-wrapper" id="pageContent"></div>`;
      
      try {
        if (menu === 'dashboard') renderDashboardContainer(); 
        else if (menu === 'cek_temuan') renderCekTemuanContainer(); 
        else if (menu === 'progress') renderProgressContainer();
        else if (menu === 'users') loadUserManagement(); 
        else if (menu === 'laporan') loadReportPanel(); 
        else if (menu === 'tambah') showTambahTemuan(); 
        else if (menu === 'upload_lhr') showUploadLHR();
        else if (menu === 'notifikasi') loadNotifikasiSettings(); 
        else if (menu === 'identitas') loadIdentitasSettings();
      } catch(e) { showErrorAlert(e.message); }
    }

    function getUniqueOptions(key) { return [...new Set(globalFindings.map(f => String(f[key]||'')).filter(x => x.trim() !== ''))].sort(); }

    function loadIdentitasSettings() {
      showLoader("Memuat pengaturan identitas...");
      let currentLogo = appConfig.app_logo ? `<div class="border rounded p-3 bg-white text-center shadow-sm"><img src="${appConfig.app_logo}" style="max-height: 120px; object-fit: contain;"></div>` : `<div class="mt-2 text-muted fst-italic">Menggunakan Logo Bawaan Sistem</div>`;
      const html = `<div class="row justify-content-center"><div class="col-md-8"><div class="card shadow-sm border-0"><div class="card-header bg-mandiri-blue text-white py-3"><h5 class="mb-0 fw-bold"><i class="fas fa-palette me-2 text-warning"></i>Identitas & Logo Aplikasi</h5></div><div class="card-body p-4 bg-light"><div class="alert alert-info border-info shadow-sm fw-medium"><i class="fas fa-info-circle me-2"></i>Pengaturan ini akan langsung mengubah wujud halaman Login dan Nama Aplikasi di Menu Atas.</div><div class="mb-4"><label class="form-label fw-bold text-primary">Nama Aplikasi</label><input type="text" id="cfgAppName" class="form-control form-control-lg border-primary" value="${appConfig.app_name || ''}" placeholder="Contoh: SaPu Temuan"></div><div class="mb-4"><label class="form-label fw-bold text-primary">Deskripsi (Sub-Judul di Halaman Login)</label><input type="text" id="cfgAppDesc" class="form-control border-primary" value="${appConfig.app_desc || ''}" placeholder="Contoh: Sistem Pemantauan Temuan Review"></div><div class="mb-4 p-3 border border-warning rounded bg-white"><label class="form-label fw-bold text-primary"><i class="fas fa-image me-2 text-warning"></i>Logo Aplikasi Saat Ini</label><br>${currentLogo}<hr><label class="form-label fw-bold mt-2">Unggah Logo Baru (Kosongkan jika tidak ingin mengubah)</label><input type="file" id="cfgAppLogo" class="form-control border-warning" accept="image/*"><small class="text-muted d-block mt-2">Gunakan format gambar <b>PNG (latar transparan)</b>. Gambar akan diunggah aman ke Google Drive.</small></div><div class="text-end"><button class="btn btn-outline-danger me-2 fw-bold" onclick="resetLogoDefault()"><i class="fas fa-trash me-1"></i> Kembali ke Logo Bawaan</button><button class="btn btn-primary btn-lg px-5 shadow-sm fw-bold" onclick="saveIdentitasAction()"><i class="fas fa-save me-2"></i> Simpan Perubahan</button></div></div></div></div></div>`;
      document.getElementById('pageContent').innerHTML = html;
      hideLoader();
    }

    async function saveIdentitasAction() {
      const appName = document.getElementById('cfgAppName').value; const appDesc = document.getElementById('cfgAppDesc').value; const fileInput = document.getElementById('cfgAppLogo');
      if(!appName) return showAlert("Nama Aplikasi tidak boleh kosong!");
      showLoader("Menyimpan pengaturan & Mengunggah Logo...");
      let payload = { app_name: appName, app_desc: appDesc };
      try {
        if (fileInput && fileInput.files.length > 0) {
            let f = fileInput.files[0]; let b64 = await toBase64(f); let fileData = { name: f.name, type: f.type, base64: b64.split(',')[1] };
            let uploadRes = await apiCall('uploadLogoToDrive', { token: authToken, fileData: fileData });
            payload.app_logo = uploadRes.url || uploadRes; 
        } else { payload.app_logo = appConfig.app_logo || ''; }
        
        await apiCall('saveConfigSettings', { token: authToken, payload: payload });
        appConfig.app_name = payload.app_name; appConfig.app_desc = payload.app_desc; appConfig.app_logo = payload.app_logo;
        document.title = appConfig.app_name; hideLoader(); showAlert("Identitas aplikasi dan Logo berhasil diperbarui!"); renderView('identitas');
      } catch(err) { hideLoader(); showErrorAlert("Error: " + err.message); }
    }

    async function resetLogoDefault() {
      showConfirm("Yakin ingin menghapus logo kustom dan menggunakan logo 'SaPu' baru bawaan sistem?", async () => {
         showLoader("Mereset logo..."); const payload = { app_name: document.getElementById('cfgAppName').value, app_desc: document.getElementById('cfgAppDesc').value, app_logo: '' };
         try {
             await apiCall('saveConfigSettings', { token: authToken, payload: payload });
             appConfig.app_logo = ''; hideLoader(); renderView('identitas');
         } catch(err) { hideLoader(); showErrorAlert(err.message); }
      });
    }

      showLoader("Memuat pengaturan notifikasi...");
      try {
        const cfg = await apiCall('getNotifSettings', { token: authToken });
        hideLoader();
        const isEmailChecked = String(cfg.enable_email) === 'true' ? 'checked' : ''; const isWaChecked = String(cfg.enable_wa) === 'true' ? 'checked' : '';

    // ==========================================
    // PROGRESS PENYELESAIAN TEMUAN

    function renderProgressContainer() {
      let groups = {};
      globalFindings.forEach(f => {
        let tgl = formatTgl(f['Tanggal Review']); let jenis = f['Jenis Review'] || '-'; let tim = f['Tim Review'] || '-'; let cab = f['cabang'] || '-';
        let key = `${tgl}##${jenis}##${tim}##${cab}`;
        if (!groups[key]) groups[key] = { tgl, jenis, tim, cab, total: 0, done: 0, pending: 0, overdue: 0, review: 0, approval: 0 };
        groups[key].total++; let s = String(f.status).toLowerCase();
        if (s === 'done') groups[key].done++; else if (s === 'pending') groups[key].pending++; else if (s === 'overdue') groups[key].overdue++; else if (s === 'review') groups[key].review++; else if (s === 'approval') groups[key].approval++;
      });

      let isCabang = currentUser.role === 'cabang';
      let thTimCabang = isCabang ? '' : '<th style="min-width: 120px;">Tim Review</th><th style="min-width: 180px;">Nama Cabang</th>';

      let html = `<div class="card shadow-sm border-0"><div class="card-header bg-white py-3"><h5 class="mb-0 fw-bold text-primary"><i class="fas fa-tasks me-2 text-warning"></i>Rekap Progress Penyelesaian</h5></div><div class="card-body p-0"><div class="table-responsive table-container px-3 pb-3 pt-0 mt-2"><table class="table table-hover align-middle"><thead><tr><th style="min-width: 110px;">Tgl Review</th><th style="min-width: 150px;">Jenis Review</th>${thTimCabang}<th style="min-width: 90px;" class="text-center">Total</th><th style="min-width: 300px;">Rincian Status</th><th style="min-width: 120px;" class="text-center">% Selesai</th></tr></thead><tbody>`;
      
      let keys = Object.keys(groups);
      if(keys.length === 0) html += `<tr><td colspan="7" class="text-center p-5 text-muted"><i class="fas fa-box-open fa-3x mb-3 text-light"></i><br>Belum ada data review.</td></tr>`;
      else {
        keys.forEach(k => {
          let g = groups[k]; let pct = g.total > 0 ? ((g.done / g.total) * 100).toFixed(1) : 0; let pClass = pct == 100 ? 'text-success' : 'text-danger';
          let rincian = '';
          if(g.done > 0) rincian += `<span class="badge bg-success me-1 mb-1">Done: ${g.done}</span>`;
          if(g.pending > 0) rincian += `<span class="badge bg-warning text-dark me-1 mb-1">Pending: ${g.pending}</span>`;
          if(g.overdue > 0) rincian += `<span class="badge bg-danger me-1 mb-1">Overdue: ${g.overdue}</span>`;
          if(g.review > 0) rincian += `<span class="badge bg-info text-white me-1 mb-1">Review: ${g.review}</span>`;
          if(g.approval > 0) rincian += `<span class="badge bg-primary me-1 mb-1">Approval: ${g.approval}</span>`;

          let tdTimCabang = isCabang ? '' : `<td class="fw-medium">${g.tim}</td><td class="fw-bold text-primary">${g.cab}</td>`;
          html += `<tr><td class="fw-medium">${g.tgl}</td><td class="fw-medium">${g.jenis}</td>${tdTimCabang}<td class="text-center fw-bold fs-6">${g.total}</td><td>${rincian}</td><td class="text-center fw-bold fs-6 ${pClass}">${pct}%</td></tr>`;
        });
      }
      html += `</tbody></table></div></div></div>`; document.getElementById('pageContent').innerHTML = html;
    }

    function applyDashFilter() {
      const fTahun = document.getElementById('dashTahun') ? document.getElementById('dashTahun').value.toLowerCase() : '';
      const fTriwulan = document.getElementById('dashTriwulan') ? document.getElementById('dashTriwulan').value.toLowerCase() : '';
      const fTim = document.getElementById('dashTim') ? document.getElementById('dashTim').value.toLowerCase() : '';
      const fJenis = document.getElementById('dashJenis') ? document.getElementById('dashJenis').value.toLowerCase() : '';
      const fCabang = document.getElementById('dashCabang') ? document.getElementById('dashCabang').value.toLowerCase() : '';
      const fDue = document.getElementById('dashDue') ? document.getElementById('dashDue').value : '';
      const fStatus = document.getElementById('dashStatus') ? document.getElementById('dashStatus').value.toLowerCase() : '';

      const filteredData = globalFindings.filter(f => {
        let match = true;
        if (fTahun && String(f['Tahun Review']||'').toLowerCase() !== fTahun) match = false;
        if (fTriwulan && String(f['Triwulan']||'').toLowerCase() !== fTriwulan) match = false;
        if (fTim && String(f['Tim Review']||'').toLowerCase() !== fTim) match = false;
        if (fJenis && String(f['Jenis Review']||'').toLowerCase() !== fJenis) match = false;
        if (fCabang && String(f.cabang||'').toLowerCase() !== fCabang) match = false;
        if (fDue && getIsoDate(f.deadline) !== fDue) match = false;
        if (fStatus && String(f.status || '').toLowerCase() !== fStatus) match = false;
        return match;
      });

      const doneCnt = filteredData.filter(f=>String(f.status).toLowerCase()==='done').length;
      const pendingCnt = filteredData.filter(f=>{ let s=String(f.status).toLowerCase(); return s==='pending'||s==='overdue'}).length;

      const total = filteredData.length;

      let statsHtml = `

        <div class="col-md-6 mb-3"><div class="card bg-success text-white h-100 border-0 shadow-sm"><div class="card-body d-flex justify-content-between align-items-center"><div><h6 class="text-white-50 fw-semibold mb-1">Selesai (Done)</h6><h2 class="mb-0 fw-bold">${doneCnt}</h2></div><div class="bg-white bg-opacity-25 p-3 rounded-circle"><i class="fas fa-check-circle fa-2x text-white"></i></div></div></div></div>
      </div></div><div class="col-md-4 mb-3"><div class="card h-100 border-0 shadow-sm"><div class="card-header bg-white py-3 border-0"><h6 class="mb-0 fw-bold text-primary text-center"><i class="fas fa-chart-pie me-2 text-warning"></i>Persentase Penyelesaian</h6></div><div class="card-body d-flex align-items-center justify-content-center"><div class="chart-container"><canvas id="statusChart"></canvas></div></div></div></div></div>`;

      setTimeout(() => {
        if(document.getElementById('statusChart') && total > 0) {
          if(myChart) myChart.destroy(); const ctx = document.getElementById('statusChart').getContext('2d');

    function applyCekTemuan() {

      const fStatus = document.getElementById('advStatus') ? document.getElementById('advStatus').value.toLowerCase() : ''; 
      const fDue = document.getElementById('advDue') ? document.getElementById('advDue').value : ''; 

      const filtered = globalFindings.filter(f => {
        let match = true;
        if (fTim && String(f['Tim Review'] || '').toLowerCase().indexOf(fTim) === -1) match = false;
        if (fJenis && String(f['Jenis Review'] || '').toLowerCase().indexOf(fJenis) === -1) match = false;

        if (fTriwulan && String(f['Triwulan'] || '').toLowerCase().indexOf(fTriwulan) === -1) match = false;
        if (fStatus && String(f.status || '').toLowerCase() !== fStatus) match = false;
        if (fDue && getIsoDate(f.deadline) !== fDue) match = false;
        return match;
      });
      renderCekTable(filtered);
    }

    window.addChecklistItem = function(text = '', isChecked = false, readOnly = false) {
        let div = document.createElement('div');
        div.className = 'd-flex align-items-center mb-2 chk-item';
        div.innerHTML = `
            <input class="form-check-input me-2 chk-box border-success" type="checkbox" style="width:1.5rem; height:1.5rem;" ${isChecked?'checked':''} ${readOnly?'disabled':''} onchange="updateProgressFromChecklist(this)">
            <input type="text" class="form-control border-0 bg-transparent fw-medium chk-text ${isChecked?'text-strike text-muted':''}" value="${text.replace(/"/g, '&quot;')}" ${readOnly?'readonly':''} oninput="updateProgressFromChecklist()" placeholder="Ketik rincian item...">
            ${!readOnly ? `<button class="btn text-danger ms-1" onclick="this.parentElement.remove(); updateProgressFromChecklist();"><i class="fas fa-times"></i></button>` : ''}
        `;
        document.getElementById('checklistArea').appendChild(div);
    }
    
    window.updateProgressFromChecklist = function(el) {
        if(el) {
            let input = el.parentElement.querySelector('.chk-text');
            if(el.checked) { input.classList.add('text-strike', 'text-muted'); }
            else { input.classList.remove('text-strike', 'text-muted'); }
        }
        let boxes = document.querySelectorAll('.chk-item .chk-box');
        let total = boxes.length; let checked = Array.from(boxes).filter(b => b.checked).length;
        let pct = total === 0 ? 0 : Math.round((checked / total) * 100);
        document.getElementById('progBadge').innerText = pct + '%';
        document.getElementById('detProgressVal').value = pct;
    }

    function renderChecklist(actionPlanText, rekomendasiText, readOnly) {
        let area = document.getElementById('checklistArea'); area.innerHTML = '';
        
        let sourceText = actionPlanText && actionPlanText.trim() ? actionPlanText : rekomendasiText;
        if (!sourceText) sourceText = "";
        
        let lines = sourceText.split('\n');
        let notes = [];
        
        lines.forEach(line => {
            let trim = line.trim(); if(!trim) return;
            let isChecked = false; let isCheck = false; let text = trim;
            
            if (trim.match(/^\[[xXvV]\]/)) { isChecked = true; isCheck = true; text = trim.substring(3).trim(); }
            else if (trim.match(/^\[\s\]/)) { isChecked = false; isCheck = true; text = trim.substring(3).trim(); }
            else if (trim.match(/^[-*•]\s+/) || trim.match(/^[0-9]+[\.\)]\s+/)) {
                isChecked = false; isCheck = true; text = trim.replace(/^[-*•]\s+/, '').replace(/^[0-9]+[\.\)]\s+/, '').trim();
            }
            
            if (isCheck) { addChecklistItem(text, isChecked, readOnly); } 
            else if (actionPlanText && actionPlanText.trim()) { notes.push(trim); } 
        });
        
        if (notes.length > 0) document.getElementById('detNotesEditable').value = notes.join('\n');
        updateProgressFromChecklist();
    }

    function getActionPlanPayload() {
        let items = document.querySelectorAll('.chk-item');
        let lines = [];
        items.forEach(item => {
            let text = item.querySelector('.chk-text').value.trim();
            let isChecked = item.querySelector('.chk-box').checked;
            if(text) lines.push((isChecked ? '[x] ' : '[ ] ') + text);
        });
        let notes = document.getElementById('detNotesEditable').value.trim();
        if(notes) lines.push('\n' + notes);
        
        let pct = document.getElementById('detProgressVal').value;
        return { text: lines.join('\n').trim(), progress: parseInt(pct) };
    }

        hideLoader();
        let opts = '<option value="">-- Pilih Pimpinan --</option>'; pimpinans.forEach(p => opts += `<option value="${p.nip}">${p.nama} (${p.nip})</option>`);
        const html = `<div class="modal fade" id="reviewModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0"><div class="modal-header bg-info text-white"><h5 class="modal-title fw-bold"><i class="fas fa-search-check me-2"></i>Teruskan ke Pimpinan</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body p-4"><label class="fw-bold mb-2">Pilih Pimpinan Approver:</label><select id="targetPimpinan" class="form-select border-info mb-3 form-select-lg">${opts}</select></div><div class="modal-footer bg-light"><button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button class="btn btn-info text-white fw-bold px-4" onclick="submitReview('${id}')"><i class="fas fa-share-square me-1"></i> Teruskan</button></div></div></div></div>`;
        document.getElementById('dynamicModals').innerHTML = html;
        setTimeout(() => new bootstrap.Modal(document.getElementById('reviewModal')).show(), 500);
      } catch(e) { hideLoader(); showErrorAlert(e.message || e); }
    }

    async function submitReview(id) {
      const pimpNip = document.getElementById('targetPimpinan').value; if (!pimpNip) return showAlert('Pilih pimpinan approver!');
      bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide(); showLoader("Meneruskan Temuan...");
      try { await apiCall('verifikasiTemuan', {idTemuan: id, targetPimpinanNip: pimpNip}); refreshData(); } catch(e) { hideLoader(); showAlert(e.message); }
    }

    function approveTemuan(id) { 
      if(document.getElementById('detailTemuanModal')) { const m = bootstrap.Modal.getInstance(document.getElementById('detailTemuanModal')); if(m) m.hide(); }
      setTimeout(() => { showConfirm('Setujui bukti ini dan ubah status menjadi Selesai (Done)?', async () => { 
          showLoader("Menyetujui Temuan..."); 
          try { await apiCall('approveTemuan', {idTemuan: id}); refreshData('closeDetail'); } catch(e) { hideLoader(); showErrorAlert(e.message); }
      }); }, 300);
    }

    // ==========================================
    // TAMBAH TEMUAN MANUAL
    // ==========================================

        const cabangs = await apiCall('getAllCabang');
        let opts = ''; cabangs.forEach(c => opts += `<option value="${c}">`); 
        document.getElementById('pageContent').innerHTML = `
          <div class="card shadow-sm border-0"><div class="card-header bg-white py-3 border-bottom"><h5 class="mb-0 fw-bold text-primary"><i class="fas fa-plus-square me-2 text-warning"></i>Form Temuan Baru (Manual)</h5></div>
          <div class="card-body p-4 bg-light">
            <div class="row">
              <div class="col-md-4 mb-3"><label class="form-label fw-bold">Jenis Review</label><input type="text" id="ntJenis" class="form-control border-primary"></div>
              <div class="col-md-4 mb-3"><label class="form-label fw-bold">Tahun Review</label><input type="number" id="ntTahun" class="form-control border-primary"></div>
              <div class="col-md-4 mb-3"><label class="form-label fw-bold">Tanggal Review</label><input type="date" id="ntTanggal" class="form-control border-primary"></div>
              <div class="col-md-4 mb-3"><label class="form-label fw-bold">Triwulan</label><input type="text" id="ntTriwulan" class="form-control border-primary" placeholder="Contoh: Q1"></div>
              <div class="col-md-4 mb-3"><label class="form-label fw-bold">Tim Review</label><input type="text" id="ntTim" class="form-control border-primary"></div>
              <div class="col-md-4 mb-3"><label class="form-label fw-bold text-danger">Batas Waktu (Deadline)</label><input type="date" id="ntDue" class="form-control border-danger"></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">Kode Cabang</label><input type="text" id="ntKodeCab" class="form-control border-primary"></div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Cabang / Unit Tujuan (Ketik/Pilih)</label>
                <input list="cabangList" id="ntCab" class="form-control border-primary" placeholder="Masukkan Nama Cabang">
                <datalist id="cabangList">${opts}</datalist>
              </div>
            </div>
            <div class="mb-3"><label class="form-label fw-bold text-dark">Risk (Risiko Temuan)</label><textarea id="ntRisk" class="form-control border-secondary" rows="3"></textarea></div>
            <div class="mb-3"><label class="form-label fw-bold text-dark">Hasil Control Testing (Deskripsi)</label><textarea id="ntDesc" class="form-control border-secondary" rows="4"></textarea></div>
            <div class="mb-3"><label class="form-label fw-bold text-dark">Rekomendasi Perbaikan</label><textarea id="ntRek" class="form-control border-secondary" rows="3"></textarea></div>
            <hr class="my-4 text-muted"><button class="btn btn-primary btn-lg px-5 shadow-sm fw-bold" onclick="tambahTemuanAction()"><i class="fas fa-paper-plane me-2"></i>Kirim Temuan ke Unit Kerja</button>
          </div></div>`;
      } catch(e) { showErrorAlert(e.message); }
    }

    async function tambahTemuanAction() {
      const payload = { jenisReview: document.getElementById('ntJenis').value, tahunReview: document.getElementById('ntTahun').value, tanggalReview: document.getElementById('ntTanggal').value, triwulan: document.getElementById('ntTriwulan').value, timReview: document.getElementById('ntTim').value, kodeCabang: document.getElementById('ntKodeCab').value, cabang: document.getElementById('ntCab').value, risk: document.getElementById('ntRisk').value, deskripsi: document.getElementById('ntDesc').value, rekomendasi: document.getElementById('ntRek').value, actionPlan: '', deadline: document.getElementById('ntDue').value };
      if(!payload.cabang || !payload.risk || !payload.deskripsi || !payload.deadline) return showAlert('Cabang, Risk, Deskripsi dan Deadline wajib diisi!');
      showLoader("Menyimpan temuan...");
      try { await apiCall('tambahTemuan', {payload: payload}); hideLoader(); renderHome(); } catch(e) { hideLoader(); showErrorAlert(e.message); }
    }

    // ==========================================
    // UPLOAD LHR (EKSTRAK WORD)
    // ==========================================
    async function showUploadLHR() {
      document.getElementById('pageContent').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p>Memuat Form...</p></div>';
      try {
        const cabangs = await apiCall('getAllCabang');
        let opts = ''; cabangs.forEach(c => opts += `<option value="${c}">`); 
        document.getElementById('pageContent').innerHTML = `
          <div class="card shadow-sm border-0">
            <div class="card-header bg-mandiri-blue text-white py-3 border-bottom"><h5 class="mb-0 fw-bold"><i class="fas fa-file-word me-2 text-warning"></i>Ekstraksi Temuan Otomatis dari LHR</h5></div>
            <div class="card-body p-4 bg-light">
              <div class="alert alert-info border-info fw-medium shadow-sm"><i class="fas fa-info-circle me-2"></i>Sistem akan membaca tabel pada dokumen Word (.doc/.docx) dan membuatkan data temuan secara otomatis. Kolom wajib: <b>No, Risk, Hasil Control Testing, Rekomendasi, Tanggapan, Status</b>.</div>
              <div class="row mt-4">
                <div class="col-md-4 mb-3"><label class="form-label fw-bold">Jenis Review</label><input type="text" id="upJenis" class="form-control border-primary"></div>
                <div class="col-md-4 mb-3"><label class="form-label fw-bold">Tahun Review</label><input type="number" id="upTahun" class="form-control border-primary"></div>
                <div class="col-md-4 mb-3"><label class="form-label fw-bold">Tanggal Review</label><input type="date" id="upTanggal" class="form-control border-primary"></div>
                <div class="col-md-4 mb-3"><label class="form-label fw-bold">Triwulan</label><input type="text" id="upTriwulan" class="form-control border-primary" placeholder="Contoh: Q1"></div>
                <div class="col-md-4 mb-3"><label class="form-label fw-bold">Tim Review</label><input type="text" id="upTim" class="form-control border-primary"></div>
                <div class="col-md-4 mb-3"><label class="form-label fw-bold text-danger">Batas Waktu (Due Date)</label><input type="date" id="upDue" class="form-control border-danger"></div>
                <div class="col-md-6 mb-3"><label class="form-label fw-bold">Kode Cabang Target</label><input type="text" id="upKodeCab" class="form-control border-primary"></div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">Cabang / Unit Tujuan (Ketik/Pilih)</label>
                  <input list="cabangListUp" id="upCab" class="form-control border-primary" placeholder="Masukkan Nama Cabang">
                  <datalist id="cabangListUp">${opts}</datalist>
                </div>
                <div class="col-md-12 mb-3">
                  <label class="form-label fw-bold text-muted">Reviewer Pendata</label>
                  <input type="text" class="form-control bg-light text-muted border-secondary" value="${currentUser.nip} (${currentUser.nama})" readonly disabled title="Otomatis diisi oleh sistem sesuai akun yang sedang login.">
                </div>
              </div>
              <div class="mt-4 p-4 border border-warning rounded bg-white shadow-sm">
                <label class="form-label fw-bold text-primary fs-5 mb-3"><i class="fas fa-upload me-2"></i>Upload File LHR (.doc / .docx)</label>
                <input type="file" id="fileLHR" class="form-control form-control-lg border-warning" accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
              </div>
              <hr class="my-4 text-muted"><button class="btn btn-warning btn-lg px-5 shadow-sm fw-bold w-100" onclick="prosesUploadLHRAction()"><i class="fas fa-magic me-2"></i>Mulai Ekstraksi Temuan Otomatis</button>
            </div>
          </div>`;
      } catch(e) { showErrorAlert(e.message); }
    }

    async function prosesUploadLHRAction() {
      const payload = { jenisReview: document.getElementById('upJenis').value, tahunReview: document.getElementById('upTahun').value, tanggalReview: document.getElementById('upTanggal').value, triwulan: document.getElementById('upTriwulan').value, timReview: document.getElementById('upTim').value, kodeCabang: document.getElementById('upKodeCab').value, cabang: document.getElementById('upCab').value, deadline: document.getElementById('upDue').value };
      if(!payload.cabang || !payload.deadline) return showAlert('Cabang Target dan Due Date wajib diisi!');
      
      const fileInput = document.getElementById('fileLHR');
      if (!fileInput || fileInput.files.length === 0) return showAlert('Harap lampirkan file dokumen LHR (Word)!');
      
      showLoader("Membaca dan memotong isi file LHR...");
      try {
        let f = fileInput.files[0]; let b64 = await toBase64(f); let fileData = { name: f.name, type: f.type, base64: b64.split(',')[1] };
        const res = await apiCall('processUploadLHR', { payload: payload, fileData: fileData });
        hideLoader();
        if(res.success) { showAlert(res.message); setTimeout(()=>refreshData(), 2000); } else { showAlert(res.message); }
      } catch(e) { hideLoader(); showAlert(`Gagal membaca file: ${e.message}`); }
    }

    // ==========================================
    // MENU ADMIN: KELOLA PENGGUNA
    // ==========================================
    async function loadUserManagement() {
      document.getElementById('pageContent').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div><p>Memuat Pengguna...</p></div>';
      try {
        const users = await apiCall('getAllUsers');
        globalUsers = users;
        let html = `<div class="card border-0 shadow-sm"><div class="card-header bg-white py-3 d-flex justify-content-between align-items-center"><h5 class="mb-0 fw-bold text-primary"><i class="fas fa-users-cog me-2 text-warning"></i>Daftar Akses Pengguna</h5><button class="btn btn-primary shadow-sm" onclick="openAddUserModal()"><i class="fas fa-user-plus me-1"></i> Tambah Akses</button></div><div class="card-body p-0"><div class="table-responsive table-container px-3 pb-3 pt-0 mt-2"><table class="table table-hover align-middle mb-0"><thead class="bg-light"><tr><th class="ps-4">NIP</th><th>Nama Lengkap</th><th>Jabatan</th><th>Tim Review</th><th>Role / Spesialisasi</th><th>Status</th><th class="pe-4">Aksi</th></tr></thead><tbody>`;
        users.forEach(u => {
          let roleDisplay = u.role === 'auditor' ? 'Reviewer' : u.role; if (u.role === 'pic_jenis') roleDisplay = `PIC: ${u.spesialisasi || '-'}`;
          html += `<tr><td class="ps-4 fw-bold text-primary">${u.nip}</td><td>${u.nama}</td><td>${u.jabatan||'-'}</td><td>${u.timReview||'-'}</td><td class="text-capitalize"><span class="badge bg-light text-dark border">${roleDisplay}</span></td><td>${u.active ? '<span class="text-success fw-bold"><i class="fas fa-circle ms-1 small"></i> Aktif</span>' : '<span class="text-danger fw-bold"><i class="fas fa-circle ms-1 small"></i> Pasif</span>'}</td><td class="pe-4"><button class="btn btn-sm btn-outline-primary" onclick="openEditUserModal('${u.nip}')"><i class="fas fa-user-edit"></i> Edit</button></td></tr>`
        });
        document.getElementById('pageContent').innerHTML = html + `</tbody></table></div></div></div>`;
      } catch(e) { showErrorAlert(e.message); }
    }

    function openAddUserModal() {
      document.getElementById('addNip').value = ''; document.getElementById('addNama').value = ''; document.getElementById('addJabatan').value = ''; document.getElementById('addEmail').value = ''; document.getElementById('addWa').value = ''; document.getElementById('addTimReview').value = ''; document.getElementById('addRole').value = 'admin'; document.getElementById('addCabang').value = ''; document.getElementById('addSpes').value = ''; document.getElementById('addPass').value = '';
      document.getElementById('addCabangDiv').style.display = 'none'; document.getElementById('addSpesDiv').style.display = 'none'; document.getElementById('addUsrMsg').innerHTML = '';
      const m = bootstrap.Modal.getOrCreateInstance(document.getElementById('addUserModal')); m.show();
    }

    async function submitAddUser() {
      const data = { nip: document.getElementById('addNip').value, nama: document.getElementById('addNama').value, jabatan: document.getElementById('addJabatan').value, email: document.getElementById('addEmail').value, whatsapp: document.getElementById('addWa').value, timReview: document.getElementById('addTimReview').value, role: document.getElementById('addRole').value, cabang: document.getElementById('addCabang').value, spesialisasi: document.getElementById('addSpes').value, password: document.getElementById('addPass').value };
      if(!data.nip || !data.nama || !data.password) return showAlert('NIP, Nama, dan Password wajib diisi.');
      document.getElementById('addUsrMsg').innerHTML = '<div class="alert alert-info fw-bold"><i class="fas fa-spinner fa-spin me-2"></i>Menyimpan pengguna...</div>';
      try {
         await apiCall('addUser', { userData: data });
         const m = bootstrap.Modal.getInstance(document.getElementById('addUserModal')); if(m) m.hide(); loadUserManagement();
      } catch(err) { document.getElementById('addUsrMsg').innerHTML = `<div class="text-danger">${err.message}</div>`; }
    }

    function openEditUserModal(nip) {
      const user = globalUsers.find(u => String(u.nip) === String(nip));
      if(!user) return showAlert('Data tidak ditemukan!');
      document.getElementById('editNip').value = user.nip; document.getElementById('editNama').value = user.nama; document.getElementById('editJabatan').value = user.jabatan || ''; document.getElementById('editEmail').value = user.email; document.getElementById('editWa').value = user.whatsapp || ''; document.getElementById('editTimReview').value = user.timReview||''; document.getElementById('editRole').value = user.role === 'auditor' ? 'reviewer' : user.role; document.getElementById('editCabang').value = user.cabang || ''; document.getElementById('editSpes').value = user.spesialisasi || ''; document.getElementById('editStatus').value = user.active ? "true" : "false"; document.getElementById('editPass').value = '';
      document.getElementById('editCabangDiv').style.display = (user.role === 'cabang') ? 'block' : 'none'; document.getElementById('editSpesDiv').style.display = (user.role === 'pic_jenis') ? 'block' : 'none'; document.getElementById('editUsrMsg').innerHTML = '';
      const m = bootstrap.Modal.getOrCreateInstance(document.getElementById('editUserModal')); m.show();
    }

    async function submitEditUser() {
      const nip = document.getElementById('editNip').value;
      const updates = { nama: document.getElementById('editNama').value, jabatan: document.getElementById('editJabatan').value, email: document.getElementById('editEmail').value, whatsapp: document.getElementById('editWa').value, timReview: document.getElementById('editTimReview').value, role: document.getElementById('editRole').value, cabang: document.getElementById('editCabang').value, spesialisasi: document.getElementById('editSpes').value, active: document.getElementById('editStatus').value === "true" };
      const pass = document.getElementById('editPass').value; if (pass) updates.password = pass;
      document.getElementById('editUsrMsg').innerHTML = '<div class="alert alert-info fw-bold"><i class="fas fa-spinner fa-spin me-2"></i>Memperbarui data...</div>';
      try {
         await apiCall('updateUser', { nip: nip, updates: updates });
         const m = bootstrap.Modal.getInstance(document.getElementById('editUserModal')); if(m) m.hide(); loadUserManagement();
      } catch(err) { document.getElementById('editUsrMsg').innerHTML = `<div class="text-danger">${err.message}</div>`; }
    }

    // MENU LAPORAN
    // ==========================================

      document.getElementById('pageContent').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
      try {
        const cabangs = await apiCall('getAllCabang');
        let opts = '<option value="">-- Pilih Cabang Target --</option>'; cabangs.forEach(c => opts += `<option value="${c}">${c}</option>`);
        document.getElementById('pageContent').innerHTML = `<div class="card border-0 shadow-sm"><div class="card-header bg-white py-3"><h5 class="mb-0 fw-bold text-primary"><i class="fas fa-file-export me-2 text-warning"></i>Cetak Dokumen LHR</h5></div><div class="card-body p-4 bg-light"><div class="row"><div class="col-md-8"><label class="form-label fw-bold">Pilih Cabang Target LHR:</label><select id="rc" class="form-select border-primary form-select-lg mb-4">${opts}</select><div class="p-3 bg-white border border-info rounded shadow-sm"><span class="fw-bold text-muted me-3 d-block d-sm-inline mb-2 mb-sm-0">Format Cetak LHR:</span><button class="btn btn-outline-danger me-2 fw-bold px-4 shadow-sm" onclick="cetakDataFormat('LHR', 'pdf')"><i class="fas fa-file-pdf me-1"></i> PDF</button><button class="btn btn-outline-success me-2 fw-bold px-4 shadow-sm" onclick="cetakDataFormat('LHR', 'xlsx')"><i class="fas fa-file-excel me-1"></i> XLSX</button><button class="btn btn-outline-primary fw-bold px-4 shadow-sm" onclick="cetakDataFormat('LHR', 'docx')"><i class="fas fa-file-word me-1"></i> DOCX</button></div></div></div></div></div>`;
      } catch(e) { showErrorAlert(e.message); }
    }
  </script>
